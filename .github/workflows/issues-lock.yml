name: 'Issues Lock'

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID'
        required: true
        default: 'all'
  schedule:
    - cron: '15 15 */5 * *'

permissions:
  issues: write

concurrency:
  group: lock

# Lock Threads - https://github.com/dakanji/lock-threads
jobs:
  lock-threads-01:
    name: Lock Resolved Issues
    runs-on: ubuntu-24.04

    if: github.actor == 'dakanji'
    steps:

      - if: github.event_name == 'schedule' || github.event.inputs.job_id == 'all' || github.event.inputs.job_id == 'lock'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Repository Checkout
        uses: actions/checkout@v4

      - name: Handle Rate Limits1
        uses: ./.github/actions/handle-rate-limits
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Handle Thread Lock1
        uses: dakanji/lock-threads@v5
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          issue-lock-reason: ''
          issue-inactive-days: '1'
          include-any-issue-labels: 'Resolved'
          remove-issue-labels: 'Triage, Stale, Tagged, Queries, Unresolved, Uncertain, Accepted'
          issue-comment: |-
            This thread is being locked.

            Please use the [Discussions Feature](https://github.com/RefindPlusRepo/RefindPlus/discussions/categories/general) for follow-on discussion or raise a new issue if appropriate.
          process-only: 'issues'

      - name: Handle Rate Limits2
        uses: ./.github/actions/handle-rate-limits
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Handle Thread Lock2
        uses: dakanji/lock-threads@v5
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          issue-lock-reason: ''
          issue-inactive-days: '2'
          include-any-issue-labels: 'Invalid, Not-Planned, Duplicate, Cannot-Replicate, Cancelled'
          remove-issue-labels: 'Stale, Tagged, Queries, Unresolved, Uncertain, Accepted'
          issue-comment: |-
            This thread is being locked.

            Please use the [Discussions Feature](https://github.com/RefindPlusRepo/RefindPlus/discussions/categories/general) for follow-on discussion or raise a new issue if appropriate.
          process-only: 'issues'

      - name: Handle Rate Limits3
        uses: ./.github/actions/handle-rate-limits
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Handle Thread Lock3
        uses: dakanji/lock-threads@v5
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          issue-lock-reason: ''
          add-issue-labels: 'Abandoned'
          issue-inactive-days: '4'
          include-any-issue-labels: 'Stale, Incomplete'
          remove-issue-labels: 'Stale, Tagged, Queries, Uncertain, Accepted'
          issue-comment: |-
            This item is being locked.

            Trigger: Apparent Abandonment.
          process-only: 'issues'

      - name: Handle Rate Limits4
        uses: ./.github/actions/handle-rate-limits
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Handle Thread Lock4
        uses: dakanji/lock-threads@v5
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          issue-lock-reason: ''
          issue-inactive-days: '7'
          include-any-issue-labels: 'Unclear'
          remove-issue-labels: 'Stale, Tagged, Queries, Uncertain, Accepted'
          issue-comment: |-
            This thread is being locked.

            Please use the [Discussions Feature](https://github.com/RefindPlusRepo/RefindPlus/discussions/categories/general) for follow-on discussion or raise a new issue if appropriate.
          process-only: 'issues'

      - name: Handle Rate Limits5
        uses: ./.github/actions/handle-rate-limits
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Handle Thread Lock5
        uses: dakanji/lock-threads@v5
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          issue-lock-reason: ''
          add-issue-labels: 'Resolved'
          issue-inactive-days: '3'
          include-any-issue-labels: ''
          exclude-any-issue-labels: 'Triage, Unclear, Parked, Prorogued, Help-Wanted, Acknowledged, Known-Issue'
          remove-issue-labels: 'Stale, Tagged, Queries, Unresolved, Uncertain, Accepted'
          issue-comment: |-
            This thread is being locked.

            Please use the [Discussions Feature](https://github.com/RefindPlusRepo/RefindPlus/discussions/categories/general) for follow-on discussion or raise a new issue if appropriate.
          process-only: 'issues'

      - name: Handle Rate Limits6
        uses: ./.github/actions/handle-rate-limits
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Handle Thread Lock6
        uses: dakanji/lock-threads@v5
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          issue-lock-reason: ''
          add-issue-labels: ''
          issue-inactive-days: '40'
          include-any-issue-labels: 'Acknowledged, Known-Issue'
          remove-issue-labels: 'Stale, Tagged, Queries, Uncertain, Accepted'
          issue-comment: |-
            This thread is being locked.

            Please use the [Discussions Feature](https://github.com/RefindPlusRepo/RefindPlus/discussions/categories/general) for follow-on discussion or raise a new issue if appropriate.
          process-only: 'issues'
