name: 'Issues Lock'

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID'
        type: string
        required: true
        default: 'all'
  schedule:
    - cron: '15 15 */3 * *'

permissions:
  issues: write

concurrency:
  group: lock

# Lock Threads - https://github.com/dessant/lock-threads
jobs:
  lock-threads-01:
    name: Lock Misc Issues
    runs-on: ubuntu-latest

    if: github.repository == 'RefindPlusRepo/RefindPlus' && (github.event_name == 'schedule' || github.event.inputs.job_id == 'all' || github.event.inputs.job_id == 'lock')
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Repository Checkout
        uses: actions/checkout@v6

      - name: Handle Rate Limits1
        uses: ./.github/actions/handle-rate-limits
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Handle Thread Lock1
        uses: dessant/lock-threads@v6
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          issue-lock-reason: ''
          issue-inactive-days: '1'
          include-any-issue-labels: 'Resolved'
          exclude-any-issue-labels: 'Stale'
          remove-issue-labels: 'Triage, No-Log, Tagged, Queries, Unresolved, Uncertain, Accepted'
          issue-comment: |-
            This thread is being locked.

            Please use the [Discussions Feature](https://github.com/RefindPlusRepo/RefindPlus/discussions/categories/general) for follow-on discussion or raise a new issue if appropriate.
          process-only: 'issues'

      - name: Handle Rate Limits2
        uses: ./.github/actions/handle-rate-limits
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Handle Thread Lock2
        uses: dessant/lock-threads@v6
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          issue-lock-reason: ''
          issue-inactive-days: '2'
          include-any-issue-labels: 'Invalid, Not-Planned, Duplicate, Cannot-Replicate, Cancelled, Config'
          exclude-any-issue-labels: 'Stale'
          remove-issue-labels: 'Tagged, Queries, Unresolved, Uncertain, Accepted'
          issue-comment: |-
            This thread is being locked.

            Please use the [Discussions Feature](https://github.com/RefindPlusRepo/RefindPlus/discussions/categories/general) for follow-on discussion or raise a new issue if appropriate.
          process-only: 'issues'

      - name: Handle Rate Limits3
        uses: ./.github/actions/handle-rate-limits
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Handle Thread Lock3
        uses: dessant/lock-threads@v6
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          issue-lock-reason: ''
          add-issue-labels: 'Abandoned'
          issue-inactive-days: '4'
          include-any-issue-labels: 'Stale'
          remove-issue-labels: 'Stale, Tagged, Queries, Uncertain, Accepted'
          issue-comment: |-
            This item is being locked.

            Trigger: Apparent Abandonment.
          process-only: 'issues'

      - name: Handle Rate Limits4
        uses: ./.github/actions/handle-rate-limits
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Handle Thread Lock4
        uses: dessant/lock-threads@v6
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          issue-lock-reason: ''
          issue-inactive-days: '7'
          include-any-issue-labels: 'Unclear, Noted'
          exclude-any-issue-labels: 'Stale'
          remove-issue-labels: 'Tagged, Queries, Uncertain, Accepted'
          issue-comment: |-
            This thread is being locked.

            Please use the [Discussions Feature](https://github.com/RefindPlusRepo/RefindPlus/discussions/categories/general) for follow-on discussion or raise a new issue if appropriate.
          process-only: 'issues'

      - name: Handle Rate Limits5
        uses: ./.github/actions/handle-rate-limits
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Handle Thread Lock5
        uses: dessant/lock-threads@v6
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          issue-lock-reason: ''
          add-issue-labels: 'Resolved'
          issue-inactive-days: '4'
          include-any-issue-labels: ''
          exclude-any-issue-labels: 'Stale, Incomplete, Queries, Triage, Unclear, Parked, Prorogued, Help-Wanted, Confirmed, Known-Issue'
          remove-issue-labels: 'Tagged, Queries, Unresolved, Uncertain, Accepted'
          issue-comment: |-
            This thread is being locked.

            Please use the [Discussions Feature](https://github.com/RefindPlusRepo/RefindPlus/discussions/categories/general) for follow-on discussion or raise a new issue if appropriate.
          process-only: 'issues'

      - name: Handle Rate Limits6
        uses: ./.github/actions/handle-rate-limits
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Handle Thread Lock6
        uses: dessant/lock-threads@v6
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          issue-lock-reason: ''
          add-issue-labels: ''
          issue-inactive-days: '45'
          include-any-issue-labels: 'Confirmed, Known-Issue'
          remove-issue-labels: 'Stale, Tagged, Queries, Uncertain, Accepted'
          issue-comment: |-
            This thread is being locked.

            Please use the [Discussions Feature](https://github.com/RefindPlusRepo/RefindPlus/discussions/categories/general) for follow-on discussion or raise a new issue if appropriate.
          process-only: 'issues'
