name: 'Issue Helper Duplicate'

on:
  workflow_dispatch:
    inputs:
      item_id:
        description: 'This Item ID'
        type: string
        required: true
      orig_id:
        description: 'Original Item ID'
        type: string
        required: true

permissions:
  issues: write

concurrency:
  group: lock

jobs:

  # Misc Issue Items - https://github.com/actions-cool/issues-helper
  issue_duplicate1:
    name: Issue - Duplicate1
    runs-on: ubuntu-24.04

    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: issueduplicate_01
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issueNumber = context.payload.inputs.item_id;
            const { data } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            const isLocked = data.locked ? 'true' : 'false';

            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_ENV, `islocked=${isLocked}\n`);

  issue_duplicate2:
    name: Issue - Duplicate2
    needs: [issue_duplicate1]
    runs-on: ubuntu-24.04

    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: issueduplicate_02
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'unlock-issue'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.orig_id }}

  issue_duplicate3:
    name: Issue - Duplicate3
    needs: [issue_duplicate2]
    runs-on: ubuntu-24.04

    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: issueduplicate_03
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            This item is a duplicate of one or more existing items

            Please refer to Item #${{ github.event.inputs.orig_id }}.

  issue_duplicate4:
    name: Issue - Duplicate4
    needs: [issue_duplicate3]
    runs-on: ubuntu-24.04

    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: issueduplicate_04
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Duplicate'

  issue_duplicate5:
    name: Issue - Duplicate5
    needs: [issue_duplicate4]
    runs-on: ubuntu-24.04

    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: issueduplicate_05
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Triage,Queries,Parked,Prorogued,Unclear,Uncertain'

  issue_duplicate6:
    name: Issue - Duplicate6
    needs: [issue_duplicate5]
    runs-on: ubuntu-24.04

    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: issueduplicate_06
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          close-reason: 'completed'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}

  issue_duplicate7:
    name: Issue - Duplicate7
    needs: [issue_duplicate6]
    runs-on: ubuntu-24.04

    if: ${{ env.islocked == 'true' }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: issueduplicate_07
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'lock-issue'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.orig_id }}
          issue-state: 'closed'
