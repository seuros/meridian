name: 'Issue Helper Label Add'

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Issue Action'
        type: choice
        options:
        - 'Label - Add - Abandoned'
        - 'Label - Add - Bug'
        - 'Label - Add - Cancelled'
        - 'Label - Add - Config'
        - 'Label - Add - Cannot-Replicate'
        - 'Label - Add - Discussion'
        - 'Label - Add - Dropped'
        - 'Label - Add - Enhancement - Only'
        - 'Label - Add - Incomplete - Issues'
        - 'Label - Add - Incomplete - Enhancement'
        - 'Label - Add - Invalid'
        - 'Label - Add - Noted'
        - 'Label - Add - Not-Planned_and_Enhancement'
        - 'Label - Add - Not-Planned - Only'
        - 'Label - Add - Parked'
        - 'Label - Add - Prorogued'
        - 'Label - Add - Queries'
        - 'Label - Add - Resolved'
        - 'Label - Add - Stale'
        - 'Label - Add - Tagged'
        - 'Label - Add - Triage'
        - 'Label - Add - Unresolved'
        - 'Label - Add - Upstream'
        default: 'Label - Add - Invalid'
      item_id:
        description: 'Item ID'
        type: string
        required: true
      discussion_reason:
        description: 'Reason for Discussion Label'
        type: choice
        options:
        - 'Question/Comment-Only'
        - 'Other'
      comment_data:
        description: 'Optional Extra Comment'
        type: string

permissions:
  issues: write

concurrency:
  group: lock

jobs:

  # Misc Issue Items - https://github.com/actions-cool/issues-helper
  label_add_abandoned:
    name: Label - Add - Abandoned
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Abandoned'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Abandoned'

  label_add_bug:
    name: Label - Add - Bug
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Bug'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Label - Add - Bug - 0
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            Thank you for taking the time to report a problem with RefindPlus.
            The problem has been confirmed and will be addressed presently.

            ${{ github.event.inputs.comment_data }}

      - name: Label - Add - Bug - 1
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Bug'

      - name: Label - Add - Bug - 2
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Not-Planned, Uncertain, Confirmed, Cancelled, Accepted, Resolved, Triage, No-Log, Parked, Tagged, Stale, Config, Queries, Unclear, Invalid, Prorogued, Incomplete, Known-Issue, Cannot-Replicate'

  label_add_cancelled:
    name: Label - Add - Cancelled
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Cancelled'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Label - Add - Cancelled - 1
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Cancelled'

      - name: Label - Add - Cancelled - 2
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Triage,No-Log'

      - name: Label - Add - Cancelled - 3
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          close-reason: 'completed'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}

  label_add_discussion:
    name: Label - Add - Discussion
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Discussion'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Label - Add - Discussion - 0
        shell: bash
        run: sudo apt install jq -y

      - name: Label - Add - Discussion - 1
        id: get-issue-details
        env:
          ENV_TOKEN: ${{ steps.app-token.outputs.token }}
          ENV_REPO: ${{ github.repository }}
          ENV_ITEM_ID: ${{ github.event.inputs.item_id }}
        shell: bash
        run: |
          # Generate Comment
          issue=$(curl -s -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${ENV_TOKEN}" \
            "https://api.github.com/repos/${ENV_REPO}/issues/${ENV_ITEM_ID}")
          echo "$issue" > issue.json
          title=$(jq -r '.title' issue.json)
          body=$(jq -r '.body' issue.json)
          notice="# This Discussion Item is an Automated Converstion of Issue/Enhancement Item #${ENV_ITEM_ID}\n\n${body}"

          # Safe Multiline Write
          echo "title<<EOF" >> "${GITHUB_ENV}"
          echo "${title}" >> "${GITHUB_ENV}"
          echo "EOF" >> "${GITHUB_ENV}"

          # Safe Multiline Write
          echo "body<<EOF" >> "${GITHUB_ENV}"
          echo "${notice}" >> "${GITHUB_ENV}"
          echo "EOF" >> "${GITHUB_ENV}"

        # 'category_id' below was derived from https://docs.github.com/en/graphql/overview/explorer
        # query {
        #   repository(owner: "dakanji", name: "RefindPlus") {
        #     id
        #     name
        #     discussionCategories(first: 5) {
        #       nodes {
        #         id # Category ID
        #         name
        #       }
        #     }
        #   }
        # }
      - name: Label - Add - Discussion - 2
        id: create-discussion
        env:
          ENV_REPO: ${{ github.repository }}
        shell: bash
        run: |
            # GitHub API Request to Create Discussion Item
            response=$(curl -s -X POST -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            https://api.github.com/repos/${ENV_REPO}/discussions \
            -d @- << EOF
            {
                "title": "${{ env.title }}",
                "body": "${{ env.body }}",
                "category_id": "MDE4OkRpc2N1c3Npb25DYXRlZ29yeTMyMDE4Mjgy"
            }
            EOF)

            # Extract Discussion Item URL from Response
            discussion_url=$(echo ${response} | jq -r '.html_url')
            echo "discussion_url=${discussion_url}" >> "${GITHUB_ENV}"

      - if: ${{ github.event.inputs.discussion_reason == 'Question/Comment-Only' }}
        name: Label - Add - Discussion - 3a
        id: add-comment-1
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            This item has been converted to [THIS DISCUSSION ITEM](${discussion_url}).

            > [!IMPORTANT]
            > You have just asked a question or simply made a comment.
            > The template indicates these should be under Discussions.
            > The guidance in the template appears to have been ignored.

            Please use the Discussions Feature for similar items in future.

            ${{ github.event.inputs.comment_data }}

            Thank you.

      - if: ${{ github.event.inputs.discussion_reason == 'Other' }}
        name: Label - Add - Discussion - 3b
        id: add-comment-2
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            This item has been converted to [THIS DISCUSSION ITEM](${discussion_url}).

            ${{ github.event.inputs.comment_data }}

      - name: Label - Add - Discussion - 4
        id: remove-labels
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Triage,No-Log,Not-Planned,Parked,Stale,Queries,Invalid,Prorogued,Duplicate,Incomplete,Known-Issue,Enhancement,Cannot-Replicate'

      - name: Label - Add - Discussion - 5
        id: add-labels
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Discussion'

      - name: Label - Add - Discussion - 6
        id: close-original-issue
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          close-reason: 'completed'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}

      - name: Label - Add - Discussion - 7
        id: lock-original-issue
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'lock-issue'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}

  label_add_dropped:
    name: Label - Add - Dropped
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Dropped'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Label - Add - Dropped - 1
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Dropped'

      - name: Label - Add - Dropped - 2
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Not-Planned, Unresolved, Uncertain, Confirmed, Cancelled, Accepted, Resolved, Triage, No-Log, Parked, Tagged, Stale, Bug, Config, Queries, Unclear, Invalid, Prorogued, Incomplete, Known-Issue, Cannot-Replicate'

      - name: Label - Add - Dropped - 3
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          close-reason: 'completed'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}

      - name: Label - Add - Dropped - 4
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'lock-issue'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}

  label_add_noted:
    name: Label - Add - Noted
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Noted'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Label - Add - Noted - 0
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            Thank you for taking the time to report a problem with RefindPlus.
            The problem is noted and will be considered as required.

            ${{ github.event.inputs.comment_data }}

      - name: Label - Add - Noted - 1
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Noted'

      - name: Label - Add - Noted - 2
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Triage, No-Log, Queries, Confirmed'

      - name: Label - Add - Noted - 3
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          close-reason: 'completed'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}

  label_add_config:
    name: Label - Add - Config
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Config'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}


      - name: Label - Add - Config - 0
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            Thank you for taking the time to report a problem with RefindPlus.
            The problem has been assessed as being configuration/setup related.

            Please consult available documentation and amend your setup as required.
            Documentation is provided in the `ReadMe` on the front page of this repository
            as well as in the sample `config.conf` file. Additionally, extensive documentation
            provided upstream can be consulted as this is largely also applicable to RefindPlus.

            ${{ github.event.inputs.comment_data }}


      - name: Label - Add - Config - 1
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Config'

      - name: Label - Add - Config - 2
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Triage, No-Log, Queries, Confirmed'

      - name: Label - Add - Config - 3
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          close-reason: 'completed'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}

  label_add_cannot-replicate:
    name: Label - Add - Cannot-Replicate
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Cannot-Replicate'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}


      - name: Label - Add - Cannot-Replicate - 1
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Cannot-Replicate'

      - name: Label - Add - Cannot-Replicate - 2
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Triage, No-Log, Queries, Confirmed'

      - name: Label - Add - Cannot-Replicate - 3
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          close-reason: 'completed'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}

  label_add_incomplete_issue:
    name: Label - Add - Incomplete - Issues
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Incomplete - Issues'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Label - Add - Incomplete - Issues - 1
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            Thank you for taking the time to report a problem with RefindPlus.

            However, at least one required item is missing.
            This is typically debug log(s) or suggested initial tests.

            On debug logs, note that...
            - They are invariably required.
            - They are always produced when running the 'DBG' file.

            ${{ github.event.inputs.comment_data }}

            Please rectify the oversight.

      - name: Label - Add - Incomplete - Issues - 2
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Incomplete'

      - name: Label - Add - Incomplete - Issues - 3
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Triage,No-Log'

  label_add_incomplete_enhancement:
    name: Label - Add - Incomplete - Enhancement
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Incomplete - Enhancement'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Label - Add - Incomplete - Enhancement - 1
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            Thank you for taking the time to suggest improvements to RefindPlus.

            However, at least one required item is missing.
            This is typically useful background information.

            ${{ github.event.inputs.comment_data }}

            Please amend your post accordingly.

      - name: Label - Add - Incomplete - Enhancement - 2
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Incomplete'

      - name: Label - Add - Incomplete - Enhancement - 3
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Triage,No-Log'

  label_add_invalid:
    name: Label - Add - Invalid
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Invalid'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Invalid'

  label_add_pending:
    name: Label - Add - Triage
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Triage'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Triage'

  label_add_parked:
    name: Label - Add - Parked
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Parked'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Parked'

  label_add_prorogued:
    name: Label - Add - Prorogued
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Prorogued'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Prorogued'

  label_add_resolved:
    name: Label - Add - Resolved
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Resolved'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Resolved'

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Unresolved'

  label_add_unresolved:
    name: Label - Add - Unresolved
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Unresolved'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Unresolved'

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Resolved'

  label_add_stale:
    name: Label - Add - Stale
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Stale'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Stale'

  label_add_tagged:
    name: Label - Add - Tagged
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Tagged'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Tagged'

  label_add_queries:
    name: Label - Add - Queries
    runs-on: ubuntu-latest

    if: github.event.inputs.operation == 'Label - Add - Queries'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Queries'

