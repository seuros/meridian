name: 'Issue Labels'

on:
  issues:
    types: [opened, reopened, closed]

permissions:
  issues: write

concurrency:
  group: lock

jobs:

  # Check Labels - https://github.com/mheap/github-action-required-labels
  add_label_user_close_check:
    name: Close Issue Label - Check
    runs-on: ubuntu-latest

    if: github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'closed'
    outputs:
      status: ${{ steps.add_label_user_close_check_main.outputs.status }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: add_label_user_close_check_main
        uses: mheap/github-action-required-labels@v5
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          mode: exactly
          count: 0
          labels: "Bug, Enhancement"
          exit_type: success

  # Add  Labels  - https://github.com/actions-cool/issues-helper
  add_label_user_close_act:
    name: Close Issue Label - Cancel
    needs: add_label_user_close_check
    runs-on: ubuntu-latest

    if: github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && needs.add_label_user_close_check.outputs.status == 'success'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'Cancelled'

  add_label_user_open_enhance:
    name: Enhancement Request Label
    runs-on: ubuntu-latest

    if: github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'opened' && contains(github.event.issue.body, 'Suggested Feature') && contains(github.event.issue.body, 'Background Information') && contains(github.event.issue.body, 'Additional Context')
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'Enhancement'

  # Add Labels - https://github.com/actions-cool/issues-helper
  add_label_user_open_drop1:
    name: Drop Modified Code Build
    needs: [add_label_user_open_enhance]
    runs-on: ubuntu-latest

    if: ${{ !failure() && github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'opened' && contains(github.event.issue.body, 'Unofficially Modified Code Build') }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # Set NodeJS Up - https://github.com/actions/setup-node
      - uses: actions/setup-node@v6
        with:
          node-version: '>=24 <=28'

      # Add Comment
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          body: |-
            Issue was manifested on a modified/customised build.
            Such issues cannot be looked into here at this time.

            > [!IMPORTANT]
            > Issues found on modified/customised builds must be tested on official files/code.
            > Should they also appear on these sources, raise your issue based on such sources.

            Thank you.

      # Add 'Dropped' Label
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'Dropped'

      # Close Issue
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          close-reason: 'not planned'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}

      # Lock Issue
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'lock-issue'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}

      # Update Issue Title - GitHub API
      - env:
          ENV_TOKEN: ${{ steps.app-token.outputs.token }}
          ENV_REPO: ${{ github.repository }}
          ENV_ISSUE_ID: ${{ github.event.issue.number }}
        shell: bash
        run: |
          # Tag as 'Unknown Provenance'
          NewTitle="RefindPlus of Unknown Provenance: Has Issues"
          curl -f -X PATCH \
            -H "Authorization: token ${ENV_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${ENV_REPO}/issues/${ENV_ISSUE_ID} \
            -d "{\"title\": \"${NewTitle}\"}" || { echo "Title Update Failed"; exit 1; }

  # Add Labels - https://github.com/actions-cool/issues-helper
  add_label_user_open_drop2:
    name: Drop for Ignored Logs
    needs: [add_label_user_open_drop1]
    runs-on: ubuntu-latest

    if: ${{ !failure() && github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'opened' && contains(github.event.issue.body, 'DEBUG_LOGS_NOT_PROVIDED - disregarding_guidance_given') }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # Add Comment
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          body: |-
            Issues without debug logs cannot be looked into at this time.

            Thank you.

      # Add 'Dropped' Label
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'Dropped'

      # Close Issue
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          close-reason: 'not planned'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}

      # Lock Issue
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'lock-issue'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}

  # Add Labels - https://github.com/actions-cool/issues-helper
  add_label_user_open_drop3:
    name: Drop for Ignored Tests
    needs: [add_label_user_open_drop2]
    runs-on: ubuntu-latest

    if: ${{ !failure() && github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'opened' && contains(github.event.issue.body, 'SUGGESTED_TESTS_IGNORED despite applicable_item') }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # Add Comment
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          body: |-
            Running the test items before raising an issue is required.

            Thank you.

      # Add 'Dropped' Label
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'Dropped'

      # Close Issue
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          close-reason: 'not planned'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}

      # Lock Issue
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'lock-issue'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}

  # Add Labels - https://github.com/actions-cool/issues-helper
  add_label_user_open_drop4:
    name: Drop for Forgotten Details
    needs: [add_label_user_open_drop3]
    runs-on: ubuntu-latest

    if: ${{ !failure() && github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'opened' && !contains(github.event.issue.body, 'DEBUG_LOGS_NOT_PROVIDED - disregarding_guidance_given') && contains(github.event.issue.body, 'No_Idea and/or Forgotten_Details') }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # Add Comment
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          body: |-
            Kindly only raise issues after properly noting key details.

            Thank you.

      # Add 'Dropped' Label
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'Dropped'

      # Close Issue
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          close-reason: 'not planned'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}

      # Lock Issue
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'lock-issue'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}

  add_label_user_outdated:
    name: Handle Outdated Version
    needs: [add_label_user_open_drop4]
    runs-on: ubuntu-latest

    if: ${{ !failure() && github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'opened' && !contains(github.event.issue.body, 'DEBUG_LOGS_NOT_PROVIDED - disregarding_guidance_given') && !contains(github.event.issue.body, 'No_Idea and/or Forgotten_Details') && contains(github.event.issue.body, 'Official Older Released Version') }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: outdated_2_1a
        uses: oprypin/find-latest-tag@v1
        with:
          repository: ${{ github.repository }}
          token: ${{ steps.app-token.outputs.token }}
          releases-only: true

      - id: outdated_2_1b
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          body: |
            You appear to be running an outdated version of RefindPlus.
            Run the current release version and update this thread accordingly.

            The current release version is **${{ steps.outdated_2_1a.outputs.tag }}**.
            You can get a copy of the current release version [HERE](https://github.com/RefindPlusRepo/RefindPlus/releases).

            Refer to [BUILDING.md](https://github.com/RefindPlusRepo/RefindPlus/blob/GOPFix/BUILDING.md) for how to build RefindPlus.
            NB: Use the `Remote GitHub Build Option` to obtain a verifiably unmodified build

            > [!IMPORTANT]
            > Add debug logging from the new run to the thread update if the issue remains.
            > That is, run the RefindPlus `DBG` efi file to generate a log file.

      - id: outdated_3_1
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.inputs.item_id }}
          labels: 'Queries'

  # Add Labels - https://github.com/actions-cool/issues-helper
  add_label_user_open1:
    name: Default Issue Label
    needs: [add_label_user_outdated]
    runs-on: ubuntu-latest

    if: ${{ !failure() && github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'opened' && !contains(github.event.issue.body, 'Unofficially Modified Code Build') && !contains(github.event.issue.body, 'Official Older Released Version') && !contains(github.event.issue.body, 'SUGGESTED_TESTS_IGNORED despite applicable_item') && !contains(github.event.issue.body, 'DEBUG_LOGS_NOT_PROVIDED - disregarding_guidance_given') && !contains(github.event.issue.body, 'No_Idea and/or Forgotten_Details') }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # Add 'Triage' Label
      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'Triage'

  # Add Labels - https://github.com/actions-cool/issues-helper
  add_label_user_open2:
    name: Log Absent Label
    needs: [add_label_user_open1]
    runs-on: ubuntu-latest

    if: ${{ !failure() && github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'opened' && !contains(github.event.issue.body, 'Unofficially Modified Code Build') && !contains(github.event.issue.body, 'Official Older Released Version') && !contains(github.event.issue.body, 'SUGGESTED_TESTS_IGNORED despite applicable_item') && !contains(github.event.issue.body, 'DEBUG_LOGS_NOT_PROVIDED - disregarding_guidance_given') && !contains(github.event.issue.body, 'No_Idea and/or Forgotten_Details') && !contains(github.event.issue.body, 'Suggested Feature') && !contains(github.event.issue.body, 'Background Information') && !contains(github.event.issue.body, 'Additional Context') }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/github-script@v8
        with:
            github-token: ${{ steps.app-token.outputs.token }}
            script: |
                const issueNumber = context.issue.number;
                const { data: comments } = await github.rest.issues.listComments({
                  ...context.repo,
                  issue_number: issueNumber
                });

                const issue = await github.rest.issues.get({
                  ...context.repo,
                  issue_number: issueNumber
                });

                const bodyCombined = [issue.data.body, ...comments.map(c => c.body)].join('\n');
                const hasLogLikeAttachment = /\b(\.log|\.txt|\.zip|\.tgz|\.gz)\b/i.test(bodyCombined);
                const labelsToAdd = ['No-Log'];

                await github.rest.issues.addLabels({
                  ...context.repo,
                  issue_number: issueNumber,
                  labels: labelsToAdd
                });

  # Check Similarity - https://github.com/actions-cool/issues-similarity-analysis
  similarity_analysis:
    name: Check Similarity
    needs: [add_label_user_open2]
    runs-on: ubuntu-latest

    if: ${{ !failure() && github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'opened' && !contains(github.event.issue.body, 'Unofficially Modified Code Build') && !contains(github.event.issue.body, 'Official Older Released Version') && !contains(github.event.issue.body, 'SUGGESTED_TESTS_IGNORED despite applicable_item') && !contains(github.event.issue.body, 'DEBUG_LOGS_NOT_PROVIDED - disregarding_guidance_given') && !contains(github.event.issue.body, 'No_Idea and/or Forgotten_Details') }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-similarity-analysis@v1
        with:
          token: ${{ steps.app-token.outputs.token }}
          since-days: 540
          filter-threshold: 0.41
          comment-title: '### Similar Item(s):'
          comment-body: '${index}. [Similarity Rating: ${similarity}] ... [${title}](https://github.com/${{ github.repository }}/issues/${number})'
          show-footer: false

  add_label_base_reopen:
    name: Reopen Issue Label - Base
    runs-on: ubuntu-latest

    if: github.actor == 'dakanji' && github.event.action == 'reopened'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'Not-Planned,Tagged,Stale,Cannot-Replicate,Known-Issue,Incomplete,Uncertain,Resolved,Unclear,Invalid,Unclear'

  add_label_user_reopen:
    name: Reopen Issue Label - User
    runs-on: ubuntu-latest

    if: github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'reopened'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'Triage'

  # Del Labels - https://github.com/actions-cool/issues-helper
  del_label_user_reopen:
    name: Remove Cancelled Label
    runs-on: ubuntu-latest

    if: github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'reopened'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'Cancelled'

  del_label_user_close:
    name: Remove Misc Labels
    runs-on: ubuntu-latest

    if: github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'closed'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'remove-labels'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'Stale,Tagged,Triage,No-Log,Cannot-Replicate,Known-Issue,Incomplete,Uncertain,Unclear,Invalid,Queries,Unclear'

  # Check Labels - https://github.com/mheap/github-action-required-labels
  bounce_bug_check1:
    name: Bounce Bug - Check1
    runs-on: ubuntu-latest

    if: github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'closed'
    outputs:
      status: ${{ steps.bounce_bug_check1_main.outputs.status }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: bounce_bug_check1_main
        uses: mheap/github-action-required-labels@v5
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          mode: exactly
          count: 1
          labels: "Bug"
          exit_type: success

  # Reopen Issue - https://github.com/actions-cool/issues-helper
  bounce_bug_act1:
    name: Bounce Bug - Act1
    needs: [bounce_bug_check1]
    runs-on: ubuntu-latest

    if: needs.bounce_bug_check1.outputs.status == 'success'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'open-issue'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}

  # Reopen Issue - https://github.com/actions-cool/issues-helper
  bounce_bug_act2:
    name: Bounce Bug - Act2
    needs: [bounce_bug_act1]
    runs-on: ubuntu-latest

    if: github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'closed'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          body: |
            Please do not close confirmed bug items in future.
            Work is planned or aleady started on such items.

  # Check Labels - https://github.com/mheap/github-action-required-labels
  bounce_enhance_check1:
    name: Bounce Enhance - Check1
    runs-on: ubuntu-latest

    if: github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'closed'
    outputs:
      status: ${{ steps.bounce_enhance_check1_main.outputs.status }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: bounce_enhance_check1_main
        uses: mheap/github-action-required-labels@v5
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          mode: exactly
          count: 1
          labels: "Enhancement"
          exit_type: success

  # Check Labels - https://github.com/mheap/github-action-required-labels
  bounce_enhance_check2:
    name: Bounce Enhance - Check2
    needs: [bounce_enhance_check1]
    runs-on: ubuntu-latest

    if: needs.bounce_enhance_check1.outputs.status == 'success'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: mheap/github-action-required-labels@v5
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          mode: exactly
          count: 1
          labels: "Accepted"

  # Reopen Issue - https://github.com/actions-cool/issues-helper
  bounce_enhance_act1:
    name: Bounce Enhance - Act1
    needs: [bounce_enhance_check2]
    runs-on: ubuntu-latest

    if: github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'closed'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'open-issue'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}

  # Reopen Issue - https://github.com/actions-cool/issues-helper
  bounce_enhance_act2:
    name: Bounce Enhance - Act2
    needs: [bounce_enhance_act1]
    runs-on: ubuntu-latest

    if: github.actor != 'refindplusrepo[bot]' && github.actor != 'dakanji' && github.event.action == 'closed'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          body: |
